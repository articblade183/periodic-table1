<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TABEL PERIODIK</title>

<style>
.title{
  text-align:center;
  margin:20px 0 14px;
}

.glow{
  position:relative;
  display:inline-block;
  font-size:clamp(26px,4vw,42px);
  font-weight:700;
  letter-spacing:3px;
  text-transform:uppercase;
  color:#eaf6ff;
  z-index:1;
}

/* layer glow */
.glow::before{
  content:attr(data-text);
  position:absolute;
  inset:0;
  z-index:-1;
  color:transparent;

  text-shadow:
    0 0 20px rgba(120,200,255,.6),
    0 0 45px rgba(0,180,255,.45),
    0 0 90px rgba(0,180,255,.35);

  animation:breathGlow 6.8s cubic-bezier(.45,0,.55,1) infinite;
  transform-origin:center;
}

/* animasi napas */
@keyframes breathGlow{
  0%{
    transform:scale(.94);
    opacity:.55;
  }
  50%{
    transform:scale(1.08);
    opacity:.95;
  }
  100%{
    transform:scale(.94);
    opacity:.55;
  }
}
:root{
  --border:#909DFF;
  --text:#eaeaff;
}
body {
  margin: 0;
  font-family:'Times New Roman', Times, serif;
  color: #eaeaff;
  
  background:
    radial-gradient(circle at 20% 20%, rgba(0, 180, 255, .12), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(180, 120, 255, .10), transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(0, 255, 200, .08), transparent 50%),
    linear-gradient(160deg, #050712, #0b1230, #050712);
  
  min-height: 100vh;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    repeating-radial-gradient(
      circle at center,
      rgba(255,255,255,.02) 0 1px,
      transparent 1px 60px
    );
  pointer-events:none;
  z-index:-1;
}
h1 {
  position: relative;
  text-align: center;
  margin: 20px 0 14px;
  font-size: clamp(26px, 4vw, 42px);
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #eaf6ff;
  
  text-shadow:
    0 0 10px rgba(0, 176, 255, 1),
    0 0 24px rgba(0, 180, 255, 1),
    0 0 48px rgba(0, 180, 255, 0.93),
    0 6px 16px rgba(0, 0, 0, .9);
  
  animation: breathingGlow 5.5s ease-in-out infinite;
}
/* WRAPPER TABLE TENGAH */
.table-wrapper{
  display:flex;
  justify-content:center;
  width:100%;
  overflow-x:auto;
  padding:0 10px;
  box-sizing:border-box;
}

/* tabel */
.table {
  display: grid;
  grid-template-columns: repeat(18, minmax(58px, 1fr));
  grid-auto-rows: 58px;
  gap: 3.5px;
  
  width: 100%;
  max-width: 100vw;
  margin: 0 auto;
}
.num {
  font-size: 5px;
  font-weight: 10;
  opacity: .7;
  align-self: flex-start;
}
.sym{
  font-size:10px;
  font-weight:700;
  margin:2px 0;
}
.mass{
  font-size:13px;
  text-align:center;
  opacity:.85;
  margin-bottom:12px;
}
.name{
  font-size:8.5px;
  opacity:.85;
  text-align:center;
  white-space:nowrap;       /* 🔥 ga pecah baris */
  overflow:hidden;
  text-overflow:ellipsis;   /* titik-titik kalau kepanjangan */
  max-width:100%;
}
/* unsur */
.el {
  border-radius: 6px;
  padding: 4px;
  border: 1px solid rgba(255, 255, 255, .25);
  box-shadow:
    0 0 6px rgba(0, 0, 0, .6),
    inset 0 0 8px rgba(255, 255, 255, .15);
}
.el:hover {
  transform: scale(1.08);
  box-shadow:
    0 0 18px rgba(255, 255, 255, .9),
    inset 0 0 10px rgba(255, 255, 255, .3);
}
.el{
  color:#000000;           /* teks dalam kotak unsur */
}
.el .num{
  color:rgba(0, 0, 0, 1);
}
.el .sym{
  color:#FFFFFF;
}
.el .mass{
  color:#FFFFFF;
}
.num{font-size:10px;opacity:.7}
.sym{font-size:20px;font-weight:700;text-align:center}
.name{font-size:9px;text-align:center;opacity:.8}

/* warna golongan */
.alkali{
  background:linear-gradient(145deg,#81D6FF,#F600FF);
}
.alkaline{
  background:linear-gradient(145deg,#FF84DD,#752C92);
}
.transition{
  background:linear-gradient(145deg,#55FFB4,#B612FF);
}
.post{
  background:linear-gradient(145deg,#52BEFF,#00FFFA);
}
.metalloid{
  background:linear-gradient(145deg,#A1EDFF,#FF0000);
}
.nonmetal{
  background:linear-gradient(145deg,#89f7fe,#6A7CFF);
}
.halogen{
  background:linear-gradient(145deg,#d4a5ff,#b993ff);
}
.noble{
  background:linear-gradient(145deg,#fbc8ff,#f5a9f2);
}
.lanthanoid{
  background:linear-gradient(145deg,#4B45FF,#EC25E7);
}
.actinoid{
  background:linear-gradient(145deg,#8B84FA,#F48FE2);
}
/* ===== INFO PANEL ===== */
.info-panel{
  width:90%;
  max-width:360px;
  margin:20px auto 30px;
  padding:18px;
  border-radius:18px;
  background:rgba(15,20,50,.95);
  border:3px solid rgba(255, 255, 255, 1);
  box-shadow:0 0 22px rgba(0, 255, 255, 1);
}

.info-title{
  font-size:18px;
  margin-bottom:14px;
  text-align:center;
}

.info-grid{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.info-item{
  padding:10px 12px;
  border-radius:12px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.15);
}
.info-item b{
  font-size:11px;
  color:#7df9ff;
  display:block;
}
.info-item span{
  font-size:14px;
}

@media(min-width:1024px){
  .table-wrapper{
    overflow-x:;
  }

  .table{
    grid-template-columns:repeat(18,70px);
    grid-auto-rows:70px;
    gap:6px;
    min-width:1400px;
  }

  .sym{font-size:20px}
  .mass{font-size:10px}
  .name{font-size:9px}
}
@keyframes breathGlow{
  0%{
    opacity:.45;
  }
  50%{
    opacity:.9;
  }
  100%{
    opacity:.45;
  }
}
</style>
</head>

elements.forEach(e=>{
  if(!e.ox){
    if(e.cls==="alkali") e.ox="+1";
    else if(e.cls==="alkaline") e.ox="+2";
    else if(e.cls==="halogen") e.ox="-1, +1, +3, +5, +7";
    else if(e.cls==="noble") e.ox="0";
    else if(e.cls==="nonmetal") e.ox="bervariasi";
    else if(e.cls==="transition") e.ox="bervariasi";
    else if(e.cls==="post") e.ox="bervariasi";
    else if(e.cls==="metalloid") e.ox="bervariasi";
    else if(e.cls==="lanthanoid") e.ox="+3";
    else if(e.cls==="actinoid") e.ox="+3, +4";
  }
});


elements.forEach(e=>{
  const d=document.createElement("div");
  d.className=`el ${e.cls}`;
  d.style.gridColumn=e.g;
  d.style.gridRow=e.p;

// lantanida (La–Lu)
if (e.cls === "lanthanoid") {
  d.style.gridRow = 9;
  d.style.gridColumn = (e.n - 56) + 2;
}

// aktinida (Ac–Lr)
if (e.cls === "actinoid") {
  d.style.gridRow = 10;
  d.style.gridColumn = (e.n - 88) + 2;
}

  d.innerHTML = `
  <div class="num">${e.n}</div>
  <div class="sym">${e.s}</div>
  <div class="mass">${e.m}</div>
  `;
  d.onclick=()=>showInfo(e);
  table.appendChild(d);
});

function showInfo(e) {
  iTitle.textContent = `${e.nm} (${e.s})`;
  iGrid.innerHTML = `
    <div class="info-item">
      <b>nomor atom</b>
      <span>${e.n}</span>
    </div>
    <div class="info-item">
      <b>massa atom</b>
      <span>${e.m}</span>
    </div>
    <div class="info-item">
      <b>golongan</b>
      <span>${e.g}</span>
    </div>
    <div class="info-item">
      <b>periode</b>
      <span>${e.p}</span>
    </div>
    <div class="info-item">
      <b>kategori</b>
      <span>${e.c}</span>
    </div>
    <div class="info-item">
      <b>bilangan oksidasi</b>
      <span>${e.ox}</span>
    </div>
    <div class="info-item">
      <b>titik didih</b>
      <span>${e.bp}</span>
    </div>
    <div class="info-item">
      <b>keterangan radiasi</b>
      <span>${e.rad}</span>
    </div>
  `;
}
</script>

</body>
